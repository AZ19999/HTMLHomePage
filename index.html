<!DOCTYPE html>
<html lang = "en">
<head>
    <meta charset = "UTF-8">
    <title>Alex's Pfizer Home Page</title>
    <link rel = "stylesheet" href = "assets/css/styles.css">
    <link rel = "icon" href = "assets/img/FAVICON.jpg" type = "image/jpg">

</head>

<header>
    <img src = "assets/img/LOGO.png" alt = "Logo" style = "height: 80px; margin-left: 8px;">
    <div style = "flex: 1; text-align: center;">Welcome Alex</div>
</header>

<body>
    <include src="_includes/header.html"></include>

    <div class="navbar">
        <a onclick="navigateWithDelay('Index.html')">Home</a>
        <a onclick="navigateWithDelay('rotation1.html')">Rotation 1</a>
        <a onclick="navigateWithDelay('rotation2.html')">Rotation 2</a>
        <a onclick="navigateWithDelay('rotation3.html')">Rotation 3</a>
        <a onclick="navigateWithDelay('rotation4.html')">Rotation 4</a>
        <a onclick="navigateWithDelay('changelog.html')">Changelog</a>
    </div>
    
    <div class="spinner-overlay" id="spinner">
        <div class="spinner"></div>
    </div>

    <div id="main-content">

        <h1 style = "text-align: center;">General Links</h1>
        <p>Links redacted for security</p>

        <div style = "margin-top: 30px; text-align: center;">
            <h1>I hate mondays</h1>
            <img src = "assets/img/garf.gif" alt = "Garf">
        </div>
    </div>

    <script>
        function navigateWithDelay(url) {
          const spinner = document.getElementById('spinner');
          const content = document.getElementById('main-content');
    
          content.classList.add('hidden');
          spinner.style.display = 'flex';
    
          setTimeout(() => {
            window.location.href = url;
          }, 250);
        }
    </script>

</body>

<footer>
    &copy; 2025-2026 Alexander Zhu. A fun little project.
</footer>

</html>
